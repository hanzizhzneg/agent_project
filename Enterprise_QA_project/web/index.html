<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Enterprise QA</title>
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
        background: #f6f8fb;
        color: #0f172a;
      }
      .container {
        max-width: 920px;
        margin: 28px auto;
        padding: 0 16px;
      }
      .card {
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        box-shadow: 0 6px 18px rgba(15, 23, 42, 0.06);
        padding: 16px;
        margin-bottom: 14px;
      }
      h1 {
        margin: 0 0 6px;
        font-size: 24px;
      }
      p {
        margin: 0;
        color: #475569;
        line-height: 1.5;
      }
      .row {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }
      .field {
        display: flex;
        flex-direction: column;
        gap: 6px;
        flex: 1;
        min-width: 220px;
      }
      input,
      textarea,
      select,
      button {
        font: inherit;
      }
      input,
      textarea,
      select {
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        padding: 9px 10px;
        background: #fff;
      }
      textarea {
        min-height: 96px;
        resize: vertical;
      }
      button {
        border: none;
        border-radius: 8px;
        padding: 10px 14px;
        cursor: pointer;
        color: #fff;
        background: #2563eb;
      }
      button.secondary {
        background: #475569;
      }
      button:disabled {
        opacity: 0.7;
        cursor: not-allowed;
      }
      .actions {
        margin-top: 12px;
        display: flex;
        gap: 12px;
      }
      pre {
        margin: 10px 0 0;
        white-space: pre-wrap;
        word-break: break-word;
        background: #0f172a;
        color: #e2e8f0;
        border-radius: 8px;
        min-height: 80px;
        padding: 12px;
      }
      ul {
        margin: 8px 0 0;
      }
      .link {
        color: #2563eb;
        text-decoration: none;
      }
      .hint {
        color: #64748b;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="card">
        <h1>企业知识库问答</h1>
        <p>简洁首页：先构建库，再提问。调试页仍可在 <a class="link" href="/test">/test</a> 使用。</p>
      </div>

      <div class="card">
        <h3>1) 构建知识库</h3>
        <div class="row">
          <label class="field">
            文档目录
            <input id="docsDir" value="knowledge_base" />
          </label>
        </div>
        <div class="actions">
          <button id="buildChromaBtn">构建 Chroma 索引</button>
          <button id="buildFaissBtn" class="secondary">构建 FAISS 索引</button>
        </div>
        <pre id="buildResult"></pre>
      </div>

      <div class="card">
        <h3>2) 问答</h3>
        <label class="field">
          问题
          <textarea id="question" placeholder="例如：附件一的内容是什么？"></textarea>
        </label>
        <div class="row" style="margin-top: 8px">
          <label class="field" style="max-width: 220px">
            使用的向量库
            <select id="askStoreType">
              <option value="chroma" selected>chroma</option>
              <option value="faiss">faiss</option>
            </select>
          </label>
          <label class="field" style="max-width: 180px">
            top_k
            <input id="topK" type="number" min="1" value="4" />
          </label>
        </div>
        <div class="actions">
          <button id="askBtn" class="secondary">回答</button>
        </div>
        <div class="hint">提示：若回答不准，先重新点击“构建库”。</div>
      </div>

      <div class="card">
        <h3>回答结果</h3>
        <pre id="answerResult"></pre>
        <h3 style="margin-top: 12px">来源引用</h3>
        <ul id="sourceList"></ul>
      </div>
    </div>

    <script>
      const buildChromaBtn = document.getElementById("buildChromaBtn");
      const buildFaissBtn = document.getElementById("buildFaissBtn");
      const askBtn = document.getElementById("askBtn");
      const buildResult = document.getElementById("buildResult");
      const answerResult = document.getElementById("answerResult");
      const sourceList = document.getElementById("sourceList");

      function setBusy(busy) {
        buildChromaBtn.disabled = busy;
        buildFaissBtn.disabled = busy;
        askBtn.disabled = busy;
      }

      function renderSources(sources) {
        sourceList.innerHTML = "";
        if (!sources || sources.length === 0) {
          const li = document.createElement("li");
          li.textContent = "暂无来源";
          sourceList.appendChild(li);
          return;
        }
        sources.forEach((src) => {
          const li = document.createElement("li");
          li.textContent = src;
          sourceList.appendChild(li);
        });
      }

      async function buildStore(storeType) {
        setBusy(true);
        buildResult.textContent = `正在构建 ${storeType} 索引，请稍候...`;
        try {
          const payload = {
            docs_dir: document.getElementById("docsDir").value.trim(),
            store_type: storeType,
          };
          const res = await fetch("/ingest", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.detail || "构建失败");
          buildResult.textContent = JSON.stringify(data, null, 2);
          document.getElementById("askStoreType").value = storeType;
        } catch (err) {
          buildResult.textContent = "错误：" + err.message;
        } finally {
          setBusy(false);
        }
      }

      buildChromaBtn.addEventListener("click", async () => buildStore("chroma"));
      buildFaissBtn.addEventListener("click", async () => buildStore("faiss"));

      askBtn.addEventListener("click", async () => {
        setBusy(true);
        answerResult.textContent = "回答生成中...";
        renderSources([]);
        try {
          const question = document.getElementById("question").value.trim();
          if (!question) throw new Error("请输入问题");
          const payload = {
            question,
            store_type: document.getElementById("askStoreType").value,
            top_k: Number(document.getElementById("topK").value || 4),
            chat_history: [],
          };
          const res = await fetch("/ask", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.detail || "问答失败");
          answerResult.textContent = data.answer || "";
          renderSources(data.sources || []);
        } catch (err) {
          answerResult.textContent = "错误：" + err.message;
        } finally {
          setBusy(false);
        }
      });
    </script>
  </body>
</html>
